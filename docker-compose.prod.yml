# ==========================================
# 企业智能办公助手平台 — 生产环境 Docker Compose
#
# 使用前在 ECS 上创建 /opt/eao/.env 文件
# 启动: IMAGE_TAG=latest docker compose -f docker-compose.prod.yml up -d
# 更新: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
# ==========================================

services:
  # ========================================
  # Redis — 缓存 & 限流
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: eao-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - eao-network
    # 生产环境不暴露端口到宿主机

  # ========================================
  # MySQL — 对话记录 & 任务历史 & 评测
  # ========================================
  mysql:
    image: mysql:8.0
    container_name: eao-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?}
      MYSQL_DATABASE: enterprise_ai_office
      MYSQL_USER: ${MYSQL_USER:-eao_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - eao-network

  # ========================================
  # ChromaDB — 向量存储
  # ========================================
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: eao-chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - eao-network

  # ========================================
  # PostgreSQL + pgvector — 可选向量存储
  # 不需要可以注释掉
  # ========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eao-postgres
    environment:
      POSTGRES_DB: enterprise_ai_office
      POSTGRES_USER: ${PG_USER:-eao_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-pg.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-eao_user} -d enterprise_ai_office"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - eao-network

  # ========================================
  # Backend — FastAPI 应用
  # ========================================
  backend:
    image: ${ACR_REGISTRY:-eao}/eao-backend:${IMAGE_TAG:-latest}
    container_name: eao-backend
    env_file:
      - .env
    environment:
      # Docker 内部网络地址覆盖
      - REDIS_URL=redis://redis:6379/0
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - PG_HOST=postgres
      - PG_PORT=5432
      # 生产环境标识
      - APP_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # 前端域名 (用于 CORS)
      - FRONTEND_URL=${FRONTEND_URL:-}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      # 持久化数据
      - ./data:/app/data
      # BGE 模型缓存 (避免重启重新下载)
      - model_cache:/root/.cache/huggingface
    restart: always
    networks:
      - eao-network

  # ========================================
  # Frontend — Nginx 静态文件 + 反向代理
  # ========================================
  frontend:
    image: ${ACR_REGISTRY:-eao}/eao-frontend:${IMAGE_TAG:-latest}
    container_name: eao-frontend
    ports:
      - "80:80"
      - "443:443"
    # HTTPS volumes (certbot 产出后取消下面注释)
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
    volumes: []
    depends_on:
      - backend
    restart: always
    networks:
      - eao-network

# ========================================
# 数据卷
# ========================================
volumes:
  redis_data:
  mysql_data:
  chroma_data:
  pgdata:
  model_cache:

# ========================================
# 内部网络
# ========================================
networks:
  eao-network:
    driver: bridge
