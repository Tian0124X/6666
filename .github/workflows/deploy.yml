# ==========================================
# 企业智能办公助手平台 — CI/CD 部署
# 触发: push master 或手动触发
# 方式: SSH → ECS → git pull → docker build → compose up
# ==========================================

name: Deploy to ECS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT }}
          script: |
            set -e
            cd /opt/eao/build
            echo ">>> 拉取最新代码..."
            git pull git@github.com:Tian0124X/6666.git master

            echo ">>> 构建 & 启动..."
            sed -i 's/\r$//' /opt/eao/server-deploy.sh
            chmod +x /opt/eao/server-deploy.sh
            /opt/eao/server-deploy.sh

            echo ">>> 健康检查..."
            sleep 5
            curl -sf http://localhost/api/health && echo "✅ 部署成功!" || echo "⚠️ 健康检查未通过"
